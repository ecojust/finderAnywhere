name: Build and release
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  oFinder:
    permissions:
      contents: write
      actions: write
      attestations: write
      deployments: write
      packages: write
      id-token: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-15" # Apple Silicon (M1 and later).
            rust_target: "aarch64-apple-darwin"
            args: "--target aarch64-apple-darwin"
          - platform: "macos-15-intel" # Intel based Macs.
            rust_target: "x86_64-apple-darwin"
            args: "--target x86_64-apple-darwin"
          - platform: "windows-latest"
            rust_target: ""
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      # Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Rust setup
      - name: Rust setup
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust target
        if: matrix.rust_target != ''
        run: rustup target add ${{ matrix.rust_target }}

      # Rust cache
      - name: Rust cache
        uses: swatinem/rust-cache@v2

      # Sync node version and setup cache
      - name: Sync node version and setup cache
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"

      # Install yarn globally
      - name: Install yarn
        run: npm install -g yarn

      # Install frontend dependencies
      - name: Install frontend dependencies
        run: yarn install

      # Download sidecar binary (opencode)
      - name: Download sidecar binary
        run: yarn sidecar

      - name: Verify sidecar binary
        shell: bash
        run: |
          ls -lh src-tauri/binaries/
          file src-tauri/binaries/opencode-* 2>/dev/null || echo "no sidecar found"

      # Build the app
      - name: Build the app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v-__VERSION__
          releaseName: "oFinder  v__VERSION__"
          releaseBody: "See the assets to download and install this version."
          releaseDraft: true
          prerelease: false
          tauriScript: yarn tauri
          assetNamePattern: "[name]_[version]_[platform]_[arch][ext]"
          args: ${{ matrix.args }}

      # Verify bundle contains the sidecar binary
      - name: Verify bundle contents
        shell: bash
        run: |
          set -x
          # Find bundle directory
          TARGET_DIR="src-tauri/target"
          if [ -n "${{ matrix.rust_target }}" ]; then
            BUNDLE_DIR="$TARGET_DIR/${{ matrix.rust_target }}/release/bundle"
          else
            BUNDLE_DIR="$TARGET_DIR/release/bundle"
          fi
          echo "=== bundle directory ==="
          find "$BUNDLE_DIR" -maxdepth 2 -type f -o -type d | head -30
          echo ""
          echo "=== bundle sizes ==="
          du -sh "$BUNDLE_DIR"/* 2>/dev/null

          # On macOS, inspect .app bundle for sidecar
          if [ "${{ runner.os }}" == "macOS" ]; then
            APP=$(find "$BUNDLE_DIR" -name "*.app" -type d | head -1)
            if [ -n "$APP" ]; then
              echo ""
              echo "=== app bundle size ==="
              du -sh "$APP"
              echo ""
              echo "=== app bundle contents (MacOS) ==="
              ls -lh "$APP/Contents/MacOS/"
              echo ""
              echo "=== sidecar binary inside app ==="
              find "$APP" -name "opencode*" -exec ls -lh {} \; 2>/dev/null || echo "opencode NOT found in app bundle"
            fi
          fi

          # On Windows, check installer directory
          if [ "${{ runner.os }}" == "Windows" ]; then
            echo ""
            echo "=== Windows bundle contents ==="
            find "$BUNDLE_DIR" -name "opencode*" -exec ls -lh {} \; 2>/dev/null || echo "opencode NOT found in bundle"
          fi
