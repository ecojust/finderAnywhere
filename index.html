<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Finder Anywhere</title>
    <link rel="stylesheet" href="/src/styles.css" />
    <script type="module" src="/src/main.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="toolbar">
        <div class="nav-controls">
          <button
            class="icon-button"
            id="backButton"
            type="button"
            aria-label="后退"
            title="后退"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="m15 18-6-6 6-6"></path>
            </svg>
          </button>
          <button
            class="icon-button"
            id="forwardButton"
            type="button"
            aria-label="前进"
            title="前进"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="m9 18 6-6-6-6"></path>
            </svg>
          </button>
        </div>

        <nav class="breadcrumbs" id="breadcrumbs" aria-label="路径"></nav>

        <div class="toolbar-actions">
          <button
            class="choose-button"
            id="chooseRootButton"
            type="button"
            title="选择根目录"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path
                d="M3 6.5A2.5 2.5 0 0 1 5.5 4H10l2 2h6.5A2.5 2.5 0 0 1 21 8.5v8A2.5 2.5 0 0 1 18.5 19h-13A2.5 2.5 0 0 1 3 16.5z"
              ></path>
            </svg>
            <span id="rootName">选择目录</span>
          </button>

          <div
            class="share-addresses"
            id="shareAddresses"
            title="局域网分享地址"
          >
            <span>分享地址加载中</span>
          </div>

          <button
            class="icon-button"
            id="portLockButton"
            type="button"
            aria-label="锁定分享端口"
            title="锁定分享端口"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <rect x="5" y="10" width="14" height="11" rx="2"></rect>
              <path d="M8 10V7a4 4 0 0 1 8 0v3"></path>
            </svg>
          </button>

          <label class="search-box" aria-label="搜索">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="11" cy="11" r="7"></circle>
              <path d="m20 20-3.8-3.8"></path>
            </svg>
            <input id="searchInput" type="search" placeholder="搜索" />
          </label>

          <div class="segmented" aria-label="视图">
            <button
              class="icon-button active"
              id="listViewButton"
              type="button"
              aria-label="列表视图"
              title="列表视图"
            >
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M8 6h13"></path>
                <path d="M8 12h13"></path>
                <path d="M8 18h13"></path>
                <path d="M3 6h.01"></path>
                <path d="M3 12h.01"></path>
                <path d="M3 18h.01"></path>
              </svg>
            </button>
            <button
              class="icon-button"
              id="gridViewButton"
              type="button"
              aria-label="网格视图"
              title="网格视图"
            >
              <svg viewBox="0 0 24 24" aria-hidden="true">
                <rect x="3" y="3" width="7" height="7" rx="1"></rect>
                <rect x="14" y="3" width="7" height="7" rx="1"></rect>
                <rect x="14" y="14" width="7" height="7" rx="1"></rect>
                <rect x="3" y="14" width="7" height="7" rx="1"></rect>
              </svg>
            </button>
          </div>

          <button
            class="icon-button"
            id="refreshButton"
            type="button"
            aria-label="刷新"
            title="刷新"
          >
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M21 12a9 9 0 0 1-15.3 6.4"></path>
              <path d="M3 12A9 9 0 0 1 18.3 5.6"></path>
              <path d="M18 2v4h4"></path>
              <path d="M6 22v-4H2"></path>
            </svg>
          </button>
        </div>
      </header>

      <main class="workspace">
        <section class="browser-panel">
          <div class="browser-header">
            <div>
              <h1 id="folderTitle">首页</h1>
              <p id="folderMeta"></p>
            </div>
          </div>
          <div class="content-area" id="contentArea"></div>
        </section>

        <aside class="preview-panel">
          <div class="preview-toolbar">
            <div>
              <h2 id="previewTitle">预览</h2>
              <p id="previewMeta"></p>
            </div>
            <div class="preview-actions" id="previewActions"></div>
          </div>
          <div class="preview-body" id="previewBody"></div>
        </aside>
      </main>
    </div>
  </body>
</html>
